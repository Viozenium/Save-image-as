<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Impostazioni: Save Image As</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, Arial, sans-serif;
        font-size: 14px;
        color: #202124;
        background: #f8f9fa;
        padding: 32px 24px;
        min-width: 320px;
        max-width: 480px;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #1a1a1a;
      }

      .section {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 20px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #5f6368;
        margin-bottom: 12px;
      }

      label.radio-option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 6px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s;
      }

      label.radio-option:hover {
        background: #f1f3f4;
      }

      label.radio-option input[type="radio"] {
        accent-color: #1a73e8;
      }

      .radio-label {
        font-size: 14px;
      }
      .radio-desc {
        font-size: 12px;
        color: #5f6368;
        margin-top: 1px;
      }

      .quality-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 6px;
        gap: 12px;
      }

      .quality-row label {
        font-size: 14px;
        white-space: nowrap;
      }

      .quality-row input[type="range"] {
        flex: 1;
        accent-color: #1a73e8;
      }

      .quality-value {
        font-size: 13px;
        font-weight: 600;
        color: #1a73e8;
        min-width: 36px;
        text-align: right;
      }

      .quality-note {
        font-size: 11px;
        color: #5f6368;
        padding: 0 6px 4px;
      }

      #status {
        font-size: 12px;
        color: #188038;
        min-height: 18px;
        text-align: right;
        opacity: 0;
        transition: opacity 0.3s;
      }

      #status.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h1>Save Image As: Impostazioni</h1>

    <div class="section">
      <div class="section-title">Formato di salvataggio</div>

      <label class="radio-option">
        <input type="radio" name="mode" value="menu" />
        <div>
          <div class="radio-label">Chiedi ogni volta</div>
          <div class="radio-desc">Mostra un sottomenu con JPG, PNG e WebP</div>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="mode" value="jpeg" />
        <div>
          <div class="radio-label">Salva sempre come JPG</div>
          <div class="radio-desc">Compresso, senza trasparenza</div>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="mode" value="png" />
        <div>
          <div class="radio-label">Salva sempre come PNG</div>
          <div class="radio-desc">Lossless, supporta la trasparenza</div>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="mode" value="webp" />
        <div>
          <div class="radio-label">Salva sempre come WebP</div>
          <div class="radio-desc">Moderno, ottimo rapporto qualità/peso</div>
        </div>
      </label>
    </div>

    <div class="section">
      <div class="section-title">Qualità compressione</div>

      <div class="quality-row">
        <label for="jpeg-quality">JPG</label>
        <input type="range" id="jpeg-quality" min="0.1" max="1" step="0.01" />
        <span class="quality-value" id="jpeg-quality-val"></span>
      </div>

      <div class="quality-row">
        <label for="webp-quality">WebP</label>
        <input type="range" id="webp-quality" min="0.1" max="1" step="0.01" />
        <span class="quality-value" id="webp-quality-val"></span>
      </div>

      <div class="quality-note">
        PNG è lossless: la qualità non è applicabile.
      </div>
    </div>

    <div id="status">Impostazioni salvate ✓</div>

    <script src="options.js"></script>
  </body>
</html>
